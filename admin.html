<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel — AdLens</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--surface:#12121e;--surface2:#1a1a2e;
  --border:rgba(255,255,255,0.07);--accent:#00f0c8;
  --text:#e8e8f0;--muted:#6b6b8a;
  --male:#4fc3f7;--female:#f48fb1;
  --success:#22c55e;--warning:#f59e0b;--error:#ef4444;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);background:rgba(9,9,15,.92);
  backdrop-filter:blur(14px);position:sticky;top:0;z-index:200}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.03em}
.logo span{color:var(--accent)}
.nav-links{display:flex;gap:.25rem}
.nav-links a{text-decoration:none;color:var(--muted);font-size:.85rem;font-weight:500;
  padding:.38rem .8rem;border-radius:6px;transition:all .2s}
.nav-links a:hover{color:var(--text);background:var(--surface)}
.nav-links a.active{color:var(--accent)}
@media(max-width:480px){.nav-links a{font-size:.76rem;padding:.35rem .5rem}}

/* LOGIN SCREEN */
.login-overlay{position:fixed;inset:0;background:rgba(9,9,15,.97);
  display:flex;align-items:center;justify-content:center;z-index:300;padding:1.5rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:2.25rem;width:100%;max-width:380px;text-align:center}
.login-card h2{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.4rem}
.login-card p{color:var(--muted);font-size:.83rem;margin-bottom:1.5rem}
.login-field{text-align:left;margin-bottom:.85rem}
.login-field label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.4rem}
.login-field input{width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:9px;padding:.68rem .9rem;font-size:.88rem;
  font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:.85rem;background:var(--accent);color:#09090f;border:none;
  border-radius:9px;font-size:.95rem;font-weight:700;font-family:'Syne',sans-serif;
  cursor:pointer;transition:all .2s;margin-top:.2rem}
.login-btn:hover{background:#00d4b0}
.login-err{color:var(--error);font-size:.78rem;margin-top:.45rem;min-height:1.1rem}
.login-hint{color:var(--muted);font-size:.72rem;margin-top:.75rem}

/* ADMIN PAGE */
.page{max-width:1300px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
.page-top{display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.page-top h1{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;
  letter-spacing:-.03em;margin-bottom:.2rem}
.page-top .sub{color:var(--muted);font-size:.83rem}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:.48rem 1rem;border-radius:8px;cursor:pointer;font-size:.83rem;
  font-family:'DM Sans',sans-serif;transition:all .2s;flex-shrink:0}
.logout-btn:hover{color:var(--error);border-color:var(--error)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:1rem;margin-bottom:2rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:1.1rem 1.3rem}
.stat-label{font-size:.74rem;color:var(--muted);margin-bottom:.25rem}
.stat-num{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800}
.sn-total{color:var(--accent)}.sn-pending{color:var(--warning)}
.sn-approved{color:var(--success)}.sn-rejected{color:var(--error)}

/* FILTER TABS */
.filter-tabs{display:flex;gap:.5rem;margin-bottom:1.35rem;flex-wrap:wrap}
.ftab{padding:.42rem .95rem;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:.82rem;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.ftab:hover{color:var(--text)}
.ftab.active{background:var(--surface2);color:var(--text);border-color:var(--accent)}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.84rem;min-width:600px}
thead th{background:var(--surface2);padding:.8rem 1rem;text-align:left;
  font-weight:600;font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.015)}
tbody td{padding:.85rem 1rem;vertical-align:middle}
.tbl-emoji{font-size:1.6rem;line-height:1}
.tbl-name{font-weight:600;font-size:.86rem;margin-bottom:.15rem}
.tbl-brand{font-size:.7rem;color:var(--muted)}
.tbl-desc{color:var(--muted);font-size:.78rem;max-width:220px;line-height:1.45}
.tbl-date{font-size:.7rem;color:var(--muted);white-space:nowrap}

/* BADGES */
.status-badge{display:inline-flex;align-items:center;padding:.22rem .6rem;
  border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap}
.sb-pending {background:rgba(245,158,11,.13);color:var(--warning);border:1px solid rgba(245,158,11,.28)}
.sb-approved{background:rgba(34,197,94,.11); color:var(--success);border:1px solid rgba(34,197,94,.25)}
.sb-rejected{background:rgba(239,68,68,.11); color:var(--error);  border:1px solid rgba(239,68,68,.25)}

.tpill{display:inline-flex;align-items:center;padding:.18rem .52rem;
  border-radius:5px;font-size:.68rem;font-weight:600;white-space:nowrap}
.tp-male  {background:rgba(79,195,247,.12); color:var(--male)}
.tp-female{background:rgba(244,143,177,.12);color:var(--female)}
.tp-all   {background:rgba(0,240,200,.08);  color:var(--accent)}

/* ACTION BUTTONS */
.act-btns{display:flex;gap:.4rem;flex-wrap:wrap}
.act{padding:.33rem .75rem;border-radius:6px;font-size:.72rem;font-weight:700;
  cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.act-approve{background:rgba(34,197,94,.13);color:var(--success);border:1px solid rgba(34,197,94,.28)}
.act-approve:hover{background:var(--success);color:#fff}
.act-reject{background:rgba(239,68,68,.1);color:var(--error);border:1px solid rgba(239,68,68,.22)}
.act-reject:hover{background:var(--error);color:#fff}
.act-delete{background:rgba(107,107,138,.1);color:var(--muted);border:1px solid var(--border)}
.act-delete:hover{background:rgba(239,68,68,.12);color:var(--error)}

/* EMPTY */
.tbl-empty{text-align:center;padding:3rem;color:var(--muted);font-size:.88rem}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(120px);
  background:var(--success);color:#fff;padding:.75rem 1.4rem;border-radius:10px;
  font-weight:600;font-size:.86rem;transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--error)}

footer{border-top:1px solid var(--border);padding:1.25rem 1.5rem;
  text-align:center;color:var(--muted);font-size:.77rem}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>

<nav>
  <div class="logo">Ad<span>Lens</span></div>
  <div class="nav-links">
    <a href="index.html">Live Display</a>
    <a href="submit.html">Submit Ad</a>
    <a href="admin.html" class="active">Admin</a>
  </div>
</nav>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div style="font-size:2.4rem;margin-bottom:.65rem">🔐</div>
    <h2>Admin Login</h2>
    <p>Restricted access — admins only.</p>
    <div class="login-field">
      <label>Username</label>
      <input id="loginUser" type="text" placeholder="Username" autocomplete="off"/>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input id="loginPass" type="password" placeholder="Password"/>
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn">Sign In →</button>
  </div>
</div>

<!-- ADMIN CONTENT (hidden until login) -->
<div id="adminContent" style="display:none">
  <div class="page">
    <div class="page-top">
      <div>
        <h1>Ad Review Panel</h1>
        <div class="sub">Manage and approve submitted advertisements</div>
      </div>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="statsRow"></div>

    <!-- FILTER TABS -->
    <div class="filter-tabs" id="filterTabs">
      <button class="ftab active" data-filter="all">All</button>
      <button class="ftab" data-filter="pending">⏳ Pending</button>
      <button class="ftab" data-filter="approved">✅ Approved</button>
      <button class="ftab" data-filter="rejected">❌ Rejected</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Ad</th>
            <th>Description</th>
            <th>Target</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adsTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<footer>
  AdLens © 2025 — <a href="index.html">Live Display</a> · <a href="submit.html">Submit Ad</a>
</footer>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ─── CREDENTIALS ─────────────────────────────────────────────────────────────
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'rafay@admin';

// ─── STORE ────────────────────────────────────────────────────────────────────
const Store = {
  getAds()     { try { return JSON.parse(localStorage.getItem('adlens_ads') || '[]'); } catch { return []; } },
  saveAds(ads) { localStorage.setItem('adlens_ads', JSON.stringify(ads)); }
};

// ─── TOAST ────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
let isLoggedIn = sessionStorage.getItem('adlens_admin') === '1';

function showAdmin() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
  renderAll();
}

function tryLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    sessionStorage.setItem('adlens_admin', '1');
    isLoggedIn = true;
    showAdmin();
  } else {
    document.getElementById('loginErr').textContent = '❌ Wrong credentials — try admin / admin123';
  }
}

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('adlens_admin');
  isLoggedIn = false;
  document.getElementById('adminContent').style.display = 'none';
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginErr').textContent = '';
});

if (isLoggedIn) showAdmin();

// ─── ACTIVE FILTER ────────────────────────────────────────────────────────────
let activeFilter = 'all';

document.getElementById('filterTabs').addEventListener('click', e => {
  const btn = e.target.closest('.ftab');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('active', b === btn));
  renderTable();
});

// ─── AD ACTIONS ───────────────────────────────────────────────────────────────
function setAdStatus(id, status) {
  const ads = Store.getAds().map(a => a.id === id ? { ...a, status } : a);
  Store.saveAds(ads);
  renderAll();
  const msgs = { approved: '✅ Ad approved and live!', rejected: '❌ Ad rejected.' };
  showToast(msgs[status], status === 'rejected');
}

function deleteAd(id) {
  if (!confirm('Delete this ad permanently?')) return;
  Store.saveAds(Store.getAds().filter(a => a.id !== id));
  renderAll();
  showToast('🗑️ Ad deleted.', true);
}

// Delegate clicks on the tbody
document.getElementById('adsTbody').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const { action, id } = btn.dataset;
  if (action === 'approve') setAdStatus(id, 'approved');
  if (action === 'reject')  setAdStatus(id, 'rejected');
  if (action === 'delete')  deleteAd(id);
});

// ─── RENDER STATS ─────────────────────────────────────────────────────────────
function renderStats() {
  const ads  = Store.getAds();
  const data = [
    { label:'Total',    num: ads.length,                                  cls:'sn-total'    },
    { label:'Pending',  num: ads.filter(a=>a.status==='pending').length,  cls:'sn-pending'  },
    { label:'Live',     num: ads.filter(a=>a.status==='approved').length, cls:'sn-approved' },
    { label:'Rejected', num: ads.filter(a=>a.status==='rejected').length, cls:'sn-rejected' },
  ];
  document.getElementById('statsRow').innerHTML = data.map(d => `
    <div class="stat">
      <div class="stat-label">${d.label}</div>
      <div class="stat-num ${d.cls}">${d.num}</div>
    </div>
  `).join('');
}

// ─── RENDER TABLE ─────────────────────────────────────────────────────────────
function renderTable() {
  const all     = Store.getAds();
  const ads     = activeFilter === 'all' ? all : all.filter(a => a.status === activeFilter);
  const sorted  = [...ads].sort((a, b) => b.submittedAt - a.submittedAt);
  const tbody   = document.getElementById('adsTbody');

  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="tbl-empty">No ads in this category.</td></tr>`;
    return;
  }

  const statusBadge = {
    pending:  '<span class="status-badge sb-pending">⏳ Pending</span>',
    approved: '<span class="status-badge sb-approved">✅ Live</span>',
    rejected: '<span class="status-badge sb-rejected">❌ Rejected</span>',
  };
  const targetPill = {
    male:   '<span class="tpill tp-male">♂ Men</span>',
    female: '<span class="tpill tp-female">♀ Women</span>',
    all:    '<span class="tpill tp-all">👥 All</span>',
  };

  tbody.innerHTML = sorted.map(ad => {
    const date = ad.submittedAt
      ? new Date(ad.submittedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '—';

    const approveBtn = ad.status !== 'approved'
      ? `<button class="act act-approve" data-action="approve" data-id="${ad.id}">Approve</button>` : '';
    const rejectBtn = ad.status !== 'rejected'
      ? `<button class="act act-reject" data-action="reject" data-id="${ad.id}">Reject</button>` : '';
    const deleteBtn = `<button class="act act-delete" data-action="delete" data-id="${ad.id}">Delete</button>`;

    return `
      <tr>
        <td class="tbl-emoji">${ad.emoji || '📢'}</td>
        <td><div class="tbl-name">${ad.title}</div><div class="tbl-brand">${ad.brand || '—'}</div></td>
        <td class="tbl-desc">${ad.description}</td>
        <td>${targetPill[ad.target] || targetPill.all}</td>
        <td>${statusBadge[ad.status] || ''}</td>
        <td class="tbl-date">${date}</td>
        <td><div class="act-btns">${approveBtn}${rejectBtn}${deleteBtn}</div></td>
      </tr>`;
  }).join('');
}

// ─── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderTable();
}
</script>
</body>
</html>
